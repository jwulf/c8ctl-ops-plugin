name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # npm >= 11.5.1 is required for provenance; node 22 ships npm 10.x.
      - run: npm install --global npm@latest
      - run: npm ci
      - run: npm run validate
      - run: npm run build
      # Publishes only when package.json's version isn't on npm yet (idempotent).
      # Auth is via GitHub Actions OIDC (npm Trusted Publishing) configured for
      # this package — no long-lived NPM_TOKEN, and provenance is signed
      # automatically.
      - run: node scripts/publish.mjs
